<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>home</title>
        <link href="../static/css/home.css" rel="stylesheet">
    </head>
    <body>
        <div class="home">
            <div class="sidebar">
                <a class="sidebar__item" href="#">
                    <img class="sidebar__icon sidebar__item_active" 
                        src="../static/images/icon_home_active.png" alt="Домой">
                </a>
                <a class="sidebar__item" href="../profile/index.html">
                    <img class="sidebar__icon" src="../static/images/icon_profile.png" alt="Профиль">
                </a>
                <a class="sidebar__item" href="#">
                    <img class="sidebar__icon" src="../static/images/icon_add.png" alt="Добавить">
                </a>
            </div>
            <main class="content">
                <div class="post">
                    <div class="post__header">
                        <img class="post__avatar" src="../static/images/avatar_ivan.png" 
                            alt="аватар Ивана">
                        <span class="post__author">Ваня Денисов</span>
                        <img class="post__edit" src="../static/images/icon_edit.png" 
                            alt="Редактировать">
                    </div>
                    <div class="post__media">
                        <img class="post__image" src="../static/images/winter_crossroads.png" 
                            alt="Человек стоит на перекрестке в метель">
                        <span class="post__image-count">1/3</span>
                    </div>
                    <button class="post__likes">
                        <img class="post__like-icon" src="../static/images/heart.png" alt="Сердечко">
                        203
                    </button>
                    <p class="post__text">Так красиво сегодня на улице! Настоящая зима)) 
                        Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне, 
                        в гор...
                    </p>
                    <span class="post__more">ещё</span>
                    <span class="post__time">2 часа назад</span>
                </div>
                <div class="post">
                    <div class="post__header">
                        <img class="post__avatar" src="../static/images/avatar_liza.png" 
                            alt="аватар Лизы">
                        <span class="post__author">Лиза Дёмина</span>
                    </div>
                    <img class="post__image" src="../static/images/vase_of_flowers.png" 
                        alt="Ваза с цветами">
                </div>
            </main>
        </div>
    </body>
</html>
