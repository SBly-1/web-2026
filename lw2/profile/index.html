<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>profile</title>
        <link href="../static/css/profile.css" rel="stylesheet">
    </head>
    <body>
        <div class="profile">
            <div class="sidebar">
                <a class="sidebar__item" href="../home/index.html">
                    <img class="sidebar__icon" src="../static/images/icon_home.png" alt="Домой">
                </a>
                <a class="sidebar__item" href="#">
                    <img class="sidebar__icon sidebar__item_active" 
                        src="../static/images/icon_profile_active.png" alt="Профиль">
                </a>
                <a class="sidebar__item" href="#">
                    <img class="sidebar__icon" src="../static/images/icon_add.png" alt="Добавить">
                </a>
            </div>
            <main class="profile__content">
                <div class="profile__info">
                    <img class="profile__avatar" src="../static/images/avatar_ivan.png" 
                        alt="аватар Ивана">
                    <h1 class="profile__author">Ваня Денисов</h1>
                    <p class="profile__description">Привет! Я системный аналитик в ACME :) 
                        Тут моя жизнь только для самых классных!
                    </p>
                    <div class="profile__posts-count">
                        <img class="profile__posts-icon" src="../static/images/icon_gallery.png" 
                            alt="Галерея">
                        <span class="profile__posts-value">43 поста</span>
                    </div>
                </div>
                <div class="profile__posts">
                    <img class="profile__image" src="../static/images/winter_crossroads.png"  
                        alt="Человек стоит на перекрестке в метель">
                    <img class="profile__image" src="../static/images/buildings.png"  
                        alt="Забор, здания и голубое небо">
                    <img class="profile__image" src="../static/images/dessert.png"  
                        alt="Шоколадный десерт с белой начинкой">
                    <img class="profile__image" src="../static/images/group_photo.png"  
                        alt="Компания друзей на фоне планет">
                    <img class="profile__image" src="../static/images/tea_packaging.png"  
                        alt="Запечатанный пакет с чаем">
                    <img class="profile__image" src="../static/images/book_page.png"  
                        alt="Страница из книги">
                    <img class="profile__image" src="../static/images/tree_foliage.png"  
                        alt="Листва дерева">
                    <img class="profile__image" src="../static/images/train_compartment.png"  
                        alt="Купе поезда">
                    <img class="profile__image" src="../static/images/pans.png"  
                        alt="Кастрюли">
                </div>
            </main>
        </div>
    </body>
</html>
